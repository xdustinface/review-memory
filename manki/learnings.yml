- id: learn-1774898909723
  content: "User context on \"src/review.ts\": This is intentional —
    `determineVerdict` operates on findings that have already passed through the
    judge (ignore-filtered). High-confidence suggestions that survive judge
    evaluation represent the judge's own assessed severity. The threshold
    catches cases where the judge systematically classifies what should be
    `required` findings as `suggestion` — exactly the leniency bias this PR
    targets."
  scope: repo
  source: xdustinface/manki#343
  created_at: 2026-03-30
