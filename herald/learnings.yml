- id: learn-1775215678578
  content: "User context on \"herald-core/src/types.rs\": Valid concern, but this
    belongs in the broker layer, not `herald-core`. The broker should overwrite
    `Message.from` with the authenticated connection's identity before routing.
    `herald-core` only defines the wire types — enforcing sender identity is a
    broker responsibility. Will address when implementing broker message
    handling."
