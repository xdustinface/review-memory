- id: "learn-002"
  content: "Claude CLI is installed as a separate workflow step before the action runs, not inside the action itself — this avoids race conditions from parallel agents"
  scope: "repo"
  source: "xdustinface/claude-review#19"
  created_at: "2026-03-24"

- id: "learn-003"
  content: "Non-blocking findings (suggestions/questions) should result in APPROVE, not COMMENT — nits don't block PRs"
  scope: "repo"
  source: "xdustinface/claude-review#23"
  created_at: "2026-03-24"
